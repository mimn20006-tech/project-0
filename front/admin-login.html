<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول الأدمن | Hand Aura</title>
  <link rel="stylesheet" href="style.css?v=20260221c">
</head>
<body class="center-page">
  <header class="admin-topbar">
    <div class="admin-topbar-inner">
      <div class="admin-brand">Hand Aura | دخول الأدمن</div>
    </div>
  </header>

  <main class="main center-main">
    <section class="auth-wrap">
      <div class="auth-card">
        <h2>تسجيل دخول الأدمن</h2>
        <form id="adminLoginForm" novalidate>
          <input type="email" name="email" placeholder="البريد الإلكتروني" required>
          <input type="password" name="password" placeholder="كلمة المرور" required>
          <button type="submit">دخول</button>
          <p class="auth-error" id="adminLoginError"></p>
        </form>
        <form id="admin2faForm" novalidate style="display:none;margin-top:0.7rem">
          <input type="text" name="code" placeholder="رمز 2FA من البريد" required>
          <button type="submit">تأكيد 2FA</button>
          <p class="auth-error" id="admin2faError"></p>
        </form>
      </div>

      <div class="auth-card" id="adminRegisterCard">
        <h2>إنشاء أدمن لأول مرة</h2>
        <form id="adminRegisterForm" novalidate>
          <input type="text" name="name" placeholder="الاسم" required>
          <input type="email" name="email" placeholder="البريد الإلكتروني" required>
          <input type="password" name="password" placeholder="كلمة المرور" required>
          <button type="submit">إنشاء أدمن</button>
          <p class="auth-error" id="adminRegisterError"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="admin-auth.js?v=20260221c"></script>
  
</body>
</html>
