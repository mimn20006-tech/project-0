<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعدادات الموقع | Hand Aura</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="site-logo.png">
  <link rel="apple-touch-icon" href="site-logo.png">
</head>
<body class="center-page">
  <header class="admin-topbar">
    <div class="admin-topbar-inner">
      <button class="icon-btn menu-btn" aria-label="القائمة">☰</button>
      <div class="admin-brand">Hand Aura | إعدادات الموقع</div>
      <a href="index.html" class="admin-back">العودة</a>
    </div>
  </header>

  <main class="main center-main">
    <div class="admin-section">
      <h2>إعدادات بيئة الموقع (SEO)</h2>
      <form id="siteForm" class="admin-form" enctype="multipart/form-data">
        <label for="siteTitle">عنوان الموقع</label>
        <input type="text" id="siteTitle" placeholder="أدخل عنوان الموقع" required maxlength="120">
        <label for="siteDescription">وصف الموقع</label>
        <textarea id="siteDescription" rows="4" placeholder="أدخل وصف الموقع بأسلوب إيجابي" required maxlength="320"></textarea>
        <label for="siteImage">صورة الموقع (تُستخدَم في المشاركة + أيقونة التبويب)</label>
        <input type="file" id="siteImage" accept="image/*">
        <button type="submit">حفظ الإعدادات</button>
        <small style="color:var(--muted)">ستُستخدم هذه البيانات في مشاركة المواقع ونتائج البحث.</small>
      </form>
      <div id="sitePreview" class="site-search-preview"></div>
    </div>
  </main>

  <script src="admin.js?v=20260222"></script>
  <div class="menu-overlay" id="menuOverlay"></div>
  <aside class="side-menu" id="sideMenu">
    <div class="side-menu-header">Admin</div>
    <a href="admin.html">الرئيسيّة</a>
    <a href="admin-products.html">المنتجات</a>
    <a href="admin-orders.html">الطلبات</a>
    <a href="admin-roles.html">الصلاحيات</a>
    <a href="admin-translations.html">الترجمة</a>
    <a href="admin-coupons.html">كوبونات</a>
    <a href="admin-sales.html">المبيعات</a>
    <a href="admin-comments.html">التعليقات</a>
    <a href="admin-hero.html">الواجهة</a>
    <a href="admin-filters.html">الفلاتر</a>
    <a href="admin-site.html">إعدادات الموقع</a>
    <a href="admin-password.html">كلمة المرور</a>
    <button type="button" class="side-logout" id="adminLogoutBtn">تسجيل الخروج</button>
  </aside>
  
  <script src="seo.js?v=20260228"></script>
</body>
</html>
