<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تتبع الطلب | Hand Aura</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-top">
      <button class="icon-btn menu-btn" aria-label="القائمة">&#9776;</button>
      <a href="index.html" class="logo">Hand Aura</a>
      <div class="header-actions">
        <a href="track.html" class="track-link" data-i18n-global="track">تتبع الطلب</a>
        <a href="cart.html" class="icon-btn cart-btn" title="السلة">&#128722; <span id="cartCount">0</span></a>
        <button class="icon-btn lang-btn" id="langToggle" type="button">AR</button>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="checkout-form" style="max-width: 500px;">
      <h2 data-i18n="track_title">تتبع حالة الطلب</h2>
      <p style="font-size:0.85rem;color:var(--muted);margin-bottom:1rem" data-i18n="track_hint">
        أدخل رقم الطلب الذي ظهر لك بعد إتمام الشراء، مع البريد الإلكتروني المستخدم في الطلب.
      </p>
      <form id="trackForm">
        <div class="form-group">
          <label data-i18n="order_id">رقم الطلب</label>
          <input type="text" name="orderId" required>
        </div>
        <div class="form-group">
          <label data-i18n="email">البريد الإلكتروني</label>
          <input type="email" name="email" required>
        </div>
        <button type="submit" class="submit-order-btn" data-i18n="show_status">عرض حالة الطلب</button>
      </form>
      <p class="contact-phone" data-i18n="contact_phone">للتواصل: 01025457419</p>
    </section>

    <section id="trackResult" class="cart-summary" style="max-width: 500px; margin:0 auto; display:none"></section>
  </main>

  <script src="track.js"></script>
  <script src="auth-ui.js"></script>

  <div class="menu-overlay" id="menuOverlay"></div>
  <aside class="side-menu" id="sideMenu">
    <div class="side-menu-header">Hand Aura</div>
    <a href="index.html" data-i18n-global="home">الرئيسية</a>
    <a href="track.html" data-i18n-global="track">تتبع الطلب</a>
    <a href="cart.html" data-i18n-global="cart">السلة</a>
    <a href="orders.html" data-i18n-global="orders">سجل الطلبات</a>
    <a href="login.html" data-auth="guest" data-i18n-global="login">تسجيل الدخول</a>
    <a href="register.html" data-auth="guest" data-i18n-global="signup">إنشاء حساب</a>
    <a href="profile.html" data-auth="user" data-i18n-global="account">الحساب</a>
    <button type="button" class="side-logout" id="logoutBtn" data-auth="user" data-i18n-global="logout">تسجيل الخروج</button>
  </aside>
</body>
</html>
