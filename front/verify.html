<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تأكيد الحساب | Hand Aura</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="center-page">
  <header class="header">
    <div class="header-top">
      <button class="icon-btn menu-btn" aria-label="القائمة">☰</button>
      <a href="index.html" class="logo">Hand Aura</a>
      <div class="header-actions">
        <a href="login.html" class="track-link">تسجيل الدخول</a>
      </div>
    </div>
  </header>

  <main class="main center-main">
    <section class="auth-wrap">
      <div class="auth-card">
        <h2>تأكيد الحساب</h2>
        <form id="verifyForm" novalidate>
          <input type="email" name="email" placeholder="البريد الإلكتروني" required>
          <input type="text" name="code" placeholder="رمز التأكيد (6 أرقام)" required>
          <button type="submit">تأكيد</button>
          <p class="auth-error" id="verifyError"></p>
        </form>
        <button type="button" class="oauth-btn" id="resendCodeBtn">إعادة إرسال الرمز</button>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="auth-ui.js"></script>
</body>
</html>
