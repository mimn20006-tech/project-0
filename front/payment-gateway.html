<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة الدفع | Hand Aura</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-top">
      <button class="icon-btn menu-btn" aria-label="القائمة">☰</button>
      <a href="index.html" class="logo">Hand Aura</a>
      <div class="header-actions">
        <a href="track.html" class="track-link" data-i18n-global="track">تتبع الطلب</a>
        <a href="cart.html" class="icon-btn cart-btn" title="السلة">🛒 <span id="cartCount">0</span></a>
        <button class="icon-btn lang-btn" id="langToggle" type="button">AR</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="checkout-form">
      <h2 id="gatewayTitle">بوابة الدفع</h2>
      <p id="gatewayInfo" style="margin-bottom:1rem;color:var(--muted)"></p>
      <div id="gatewayInstructions" style="margin-bottom:1rem"></div>
      <button type="button" class="submit-order-btn" id="gatewaySuccessBtn">العودة للتحقق من الدفع</button>
      <button type="button" class="checkout-btn" id="gatewayFailBtn" style="margin-top:0.75rem">فشل الدفع / إلغاء</button>
      <p id="gatewayMsg" style="margin-top:0.75rem;color:var(--muted)"></p>
    </div>
  </main>

  <script src="payment-gateway.js"></script>
  <script src="auth-ui.js?v=20260221d"></script>

  <div class="menu-overlay" id="menuOverlay"></div>
  <aside class="side-menu" id="sideMenu">
    <div class="side-menu-header">Hand Aura</div>
    <a href="index.html" data-i18n-global="home">الرئيسية</a>
    <a href="track.html" data-i18n-global="track">تتبع الطلب</a>
    <a href="cart.html" data-i18n-global="cart">السلة</a>
    <a href="orders.html" data-i18n-global="orders">سجل الطلبات</a>
    <a href="login.html" data-auth="guest" data-i18n-global="login">تسجيل الدخول</a>
    <a href="register.html" data-auth="guest" data-i18n-global="signup">إنشاء حساب</a>
    <a href="profile.html" data-auth="user" data-i18n-global="account">الحساب</a>
    <button type="button" class="side-logout" id="logoutBtn" data-auth="user" data-i18n-global="logout">تسجيل الخروج</button>
  </aside>
</body>
</html>
