<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | Hand Aura</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="center-page">
  <header class="header">
    <div class="header-top">
      <button class="icon-btn menu-btn" aria-label="القائمة">☰</button>
      <a href="index.html" class="logo">Hand Aura</a>
      <div class="header-actions">
        <a href="track.html" class="track-link">تتبع الطلب</a>
        <a href="cart.html" class="icon-btn cart-btn" title="السلة">🛒 <span id="cartCount">0</span></a>
      </div>
    </div>
  </header>

  <main class="main center-main">
    <section class="auth-wrap">
      <div class="auth-card">
        <h2>تسجيل الدخول</h2>
        <form id="loginForm" novalidate>
          <div class="auth-field">
            <span class="auth-icon">✉️</span>
            <input type="email" name="email" placeholder="البريد الإلكتروني" required>
          </div>
          <div class="auth-field">
            <span class="auth-icon">🔒</span>
            <input type="password" name="password" placeholder="كلمة المرور" required>
          </div>
          <button type="submit">تسجيل الدخول</button>
          <div class="auth-divider">أو</div>
          <button type="button" class="oauth-btn google-btn">المتابعة باستخدام Google</button>
          <button type="button" class="oauth-btn apple-btn">المتابعة باستخدام Apple</button>
          <p class="auth-error" id="loginError"></p>
          <p class="auth-hint">ليس لديك حساب؟ <a href="register.html">إنشاء حساب</a></p>
          <p class="auth-hint"><a href="verify.html">تأكيد الحساب</a> · <a href="forgot.html">نسيت كلمة المرور؟</a></p>
        </form>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="auth-ui.js?v=20260221d"></script>

  <div class="menu-overlay" id="menuOverlay"></div>
  <aside class="side-menu" id="sideMenu">
    <div class="side-menu-header">Hand Aura</div>
    <a href="index.html" data-i18n-global="home">الرئيسية</a>
    <a href="track.html" data-i18n-global="track">تتبع الطلب</a>
    <a href="cart.html" data-i18n-global="cart">السلة</a>
    <a href="orders.html" data-i18n-global="orders">سجل الطلبات</a>
    <a href="login.html" data-auth="guest" data-i18n-global="login">تسجيل الدخول</a>
    <a href="register.html" data-auth="guest" data-i18n-global="signup">إنشاء حساب</a>
    <a href="profile.html" data-auth="user" data-i18n-global="account">الحساب</a>
    <button type="button" class="side-logout" id="logoutBtn" data-auth="user" data-i18n-global="logout">تسجيل الخروج</button>
  </aside>
</body>
</html>
