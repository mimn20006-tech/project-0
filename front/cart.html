<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>السلة | Hand Aura</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="site-logo.png">
  <link rel="apple-touch-icon" href="site-logo.png">
</head>
<body class="clone-ui">
  <header class="header">
    <div class="header-top">
      <button class="icon-btn menu-btn" aria-label="القائمة">&#9776;</button>
      <a href="index.html" class="logo">Hand Aura</a>
      <nav class="clone-nav" aria-label="روابط رئيسية">
        <a href="index.html" class="active">الرئيسية</a>
        <a href="profile.html">الحساب</a>
      </nav>
      <div class="header-actions">
        <a href="track.html" class="track-link" data-i18n-global="track">تتبع الطلب</a>
        <button class="icon-btn lang-btn" id="langToggle" type="button">AR</button>
        <a href="cart.html" class="icon-btn cart-btn" title="السلة">
          &#128722;
          <span id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="main">
    <h1 class="title" data-i18n-cart="cart_title">سلة التسوق</h1>
    <div id="cartContent"></div>

    <div id="checkoutForm" class="checkout-form" style="display:none">
      <h2 data-i18n-cart="checkout_title">إتمام الطلب</h2>
      <form id="orderForm">
        <div class="form-group">
          <label data-i18n-cart="name">الاسم</label>
          <input type="text" name="customerName" required>
        </div>
        <div class="form-group">
          <label data-i18n-cart="email">البريد الإلكتروني</label>
          <input type="email" name="customerEmail" required>
        </div>
        <div class="form-group">
          <label data-i18n-cart="phone">رقم الهاتف</label>
          <input type="tel" name="customerPhone" required>
        </div>
        <div class="form-group">
          <label data-i18n-cart="address">العنوان</label>
          <input type="text" name="address" required>
        </div>
        <div class="form-group">
          <label data-i18n-cart="payment_method">طريقة الدفع</label>
          <div class="payment-options">
            <label class="pay-opt"><input type="radio" name="paymentMethod" value="cash_on_delivery" checked> <span data-i18n-cart="cod">الدفع عند الاستلام</span></label>
            <label class="pay-opt"><input type="radio" name="paymentMethod" value="vodafone_cash"> <span data-i18n-cart="vodafone">فودافون كاش</span></label>
            <label class="pay-opt"><input type="radio" name="paymentMethod" value="fawry"> <span data-i18n-cart="fawry">فوري</span></label>
            <label class="pay-opt"><input type="radio" name="paymentMethod" value="visa"> <span>Visa / MasterCard</span></label>
            <label class="pay-opt"><input type="radio" name="paymentMethod" value="paymob"> <span>Paymob</span></label>
            <label class="pay-opt"><input type="radio" name="paymentMethod" value="paypal"> <span>PayPal</span></label>
          </div>
          <p id="paymentMsg" class="field-error" style="display:none;margin-top:8px"></p>
        </div>

        <div class="form-group checkout-summary-box">
          <div class="checkout-line">
            <span>المجموع قبل الخصم</span>
            <strong id="subtotalBeforeDiscount">0 جنيه</strong>
          </div>
        </div>

        <div class="form-group">
          <label for="couponCodeInput">كوبون الخصم</label>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <button type="button" class="admin-btn" id="clearCouponBtn">إلغاء الكوبون</button>
            <input type="text" id="couponCodeInput" placeholder="اكتب كود الخصم">
            <button type="button" class="admin-btn admin-btn-edit" id="applyCouponBtn">تطبيق الكوبون</button>
          </div>
          <p id="couponMsg" class="field-error" style="display:none;margin-top:8px"></p>
        </div>

        <div class="form-group checkout-summary-box">
          <div class="checkout-line">
            <span>الخصم</span>
            <strong id="discountAmount">0 جنيه</strong>
          </div>
          <div class="checkout-line total-after">
            <span>المجموع بعد الخصم</span>
            <strong id="totalAfterDiscount">0 جنيه</strong>
          </div>
        </div>

        <button type="submit" class="submit-order-btn" data-i18n-cart="confirm_order">تأكيد الطلب</button>
      </form>
    </div>

    <div id="successMsg" class="success-msg" style="display:none"></div>
    <div id="cartRecommendations"></div>
  </main>

  <script src="cart.js?v=20260222"></script>
  <script src="auth-ui.js?v=20260222"></script>
  <script src="analytics.js?v=20260222"></script>

  <div class="menu-overlay" id="menuOverlay"></div>
  <aside class="side-menu" id="sideMenu">
    <div class="side-menu-header">Hand Aura</div>
    <a href="index.html" data-i18n-global="home">الرئيسية</a>
    <a href="track.html" data-i18n-global="track">تتبع الطلب</a>
    <a href="cart.html" data-i18n-global="cart">السلة</a>
    <a href="orders.html" data-i18n-global="orders">سجل الطلبات</a>
    <a href="login.html" data-auth="guest" data-i18n-global="login">تسجيل الدخول</a>
    <a href="register.html" data-auth="guest" data-i18n-global="signup">إنشاء حساب</a>
    <a href="profile.html" data-auth="user" data-i18n-global="account">الحساب</a>
    <button type="button" class="side-logout" id="logoutBtn" data-auth="user" data-i18n-global="logout">تسجيل الخروج</button>
  </aside>
  
  <script src="seo.js?v=20260228"></script>
</body>
</html>
