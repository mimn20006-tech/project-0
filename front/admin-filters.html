<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة المرشحات | Hand Aura</title>
  <link rel="stylesheet" href="style.css?v=20260214">
</head>
<body class="center-page">
  <header class="admin-topbar">
    <div class="admin-topbar-inner">
      <button class="icon-btn menu-btn" aria-label="القائمة">☰</button>
      <div class="admin-brand">Hand Aura | إدارة المرشحات</div>
      <a href="index.html" class="admin-back">الرجوع</a>
    </div>
  </header>

  <main class="main center-main">
    <div class="admin-section">
      <h2>إدارة المرشحات والفئات</h2>
      <div class="admin-filters">
        <div>
          <h3>الفئات</h3>
          <div id="categoriesWrap" class="filter-list"></div>
          <div class="filter-add">
            <input type="text" id="newCategoryAr" placeholder="اسم الفئة بالعربية">
            <input type="text" id="newCategoryEn" placeholder="اسم الفئة بالإنجليزية">
            <input type="text" id="newCategoryKey" placeholder="المفتاح (مثال: Men)">
            <button type="button" class="admin-btn admin-btn-edit" id="addCategoryBtn">إضافة فئة</button>
          </div>
        </div>
        <div>
          <h3>الأنواع</h3>
          <div id="typesWrap" class="filter-list"></div>
          <div class="filter-add">
            <input type="text" id="newTypeAr" placeholder="اسم النوع بالعربية">
            <input type="text" id="newTypeEn" placeholder="اسم النوع بالإنجليزية">
            <input type="text" id="newTypeKey" placeholder="المفتاح (مثال: hoodie)">
            <button type="button" class="admin-btn admin-btn-edit" id="addTypeBtn">إضافة نوع</button>
          </div>
        </div>
      </div>
      <div class="filter-actions">
        <button type="button" class="admin-btn admin-btn-edit" id="saveFiltersBtn">حفظ التغييرات</button>
        <button type="button" class="admin-btn admin-btn-delete" id="resetFiltersBtn">إعادة تعيين</button>
      </div>
    </div>
  </main>

  <script src="admin.js?v=20260221"></script>
  <div class="menu-overlay" id="menuOverlay"></div>
  <aside class="side-menu" id="sideMenu">
    <div class="side-menu-header">Admin</div>
    <a href="admin.html">الرائيسية</a>
    <a href="admin-products.html">المنتجات</a>
    <a href="admin-orders.html">الطلبات</a>
    <a href="admin-roles.html">الصلاحيات</a>
    <a href="admin-translations.html">الترجمة</a>
    <a href="admin-coupons.html">كوبونات</a>
    <a href="admin-sales.html">المبيعات</a>
    <a href="admin-comments.html">التعليقات</a>
    <a href="admin-hero.html">الواجهة</a>
    <a href="admin-filters.html">الفلاتر</a>
    <a href="admin-site.html">إعدادات الموقع</a>
    <a href="admin-password.html">كلمة المرور</a>
    <button type="button" class="side-logout" id="adminLogoutBtn">تسجيل الخروج</button>
  </aside>
  <script src="text-fix.js?v=20260221e"></script>
</body>
</html>
